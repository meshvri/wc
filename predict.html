<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>🏆 توقعات كأس العالم 2026</title>
<meta name="theme-color" content="#0d1f14">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
  :root {
    --green:#1a6b3a; --green-light:#25a05a; --gold:#c9a227; --gold-light:#f0c040;
    --dark:#0d1f14; --card:#132b1c; --card2:#1a3825; --line:#1e4028; --border:#2e5a3a;
    --text:#e8f5ec; --muted:#7aad8e; --red:#e05555; --win:#25a05a; --draw:#c9a227; --lose:#e05555;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Cairo',sans-serif; background:var(--dark); color:var(--text); min-height:100vh; -webkit-text-size-adjust:100%; }
  img { display:block; }

  /* header + tabs travel together as one sticky bar, so the bar can never
     partly slide behind itself regardless of header height or safe-area inset */
  .topbar { position:sticky; top:0; z-index:100; background:var(--dark); }
  .header { background:linear-gradient(135deg,#0d1f14,#1a3825); border-bottom:2px solid var(--gold); padding:calc(env(safe-area-inset-top) + 16px) 20px 12px; text-align:center; position:relative; }
  .header h1 { font-size:1.4rem; font-weight:900; color:var(--gold-light); }
  .header p { color:var(--muted); font-size:0.82rem; margin-top:2px; }
  .header .out { position:absolute; left:14px; top:calc(env(safe-area-inset-top) + 18px); background:none; border:1px solid var(--border); color:var(--muted); border-radius:18px; padding:5px 12px; font-family:inherit; font-size:0.72rem; font-weight:700; cursor:pointer; }
  .header .sched { position:absolute; right:14px; top:calc(env(safe-area-inset-top) + 18px); border:1px solid var(--gold); color:var(--gold-light); border-radius:18px; padding:5px 12px; font-size:0.72rem; font-weight:700; text-decoration:none; }

  .tabs { display:flex; background:var(--card); border-bottom:1px solid var(--line); }
  .tab { flex:1; padding:13px 4px; text-align:center; cursor:pointer; font-size:0.8rem; font-weight:700; color:var(--muted); border-bottom:3px solid transparent; transition:all 0.2s; font-family:inherit; background:none; }
  .tab.active { color:var(--gold-light); border-bottom-color:var(--gold); background:var(--card2); }

  .section { display:none; padding:16px; max-width:680px; margin:0 auto; }
  .section.active { display:block; }

  .card { background:var(--card); border-radius:14px; padding:16px; margin-bottom:14px; border:1px solid var(--line); }

  .pts-legend { display:flex; gap:8px; }
  .pts-item { background:var(--card2); border-radius:10px; padding:9px 8px; font-size:0.76rem; text-align:center; flex:1; line-height:1.5; }
  .pts-val { font-size:1.2rem; font-weight:900; color:var(--gold-light); display:block; }

  .group-label { font-size:0.85rem; color:var(--gold); font-weight:700; margin:18px 4px 8px; letter-spacing:0.5px; }

  .match-card { background:var(--card); border-radius:14px; padding:14px; margin-bottom:12px; border:1px solid var(--line); }
  .match-card.locked { opacity:0.96; }
  .match-card.focus-flash { animation:focusFlash 1.6s ease-out; }
  @keyframes focusFlash {
    0%,40% { box-shadow:0 0 0 2px var(--gold), 0 0 18px rgba(201,162,39,0.45); border-color:var(--gold); }
    100% { box-shadow:none; }
  }
  .match-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; font-size:0.74rem; color:var(--muted); }
  .match-when { font-weight:600; }
  .st-chip { font-size:0.68rem; font-weight:800; padding:3px 9px; border-radius:20px; }
  .st-chip.live { background:var(--red); color:#fff; }
  .st-chip.ft { background:var(--card2); color:var(--muted); border:1px solid var(--border); }
  .st-chip.soon { background:#143; color:var(--gold-light); }
  .st-chip.lock { background:var(--card2); color:var(--muted); }

  .teams-row { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:8px; margin-bottom:12px; }
  .team { text-align:center; font-size:0.92rem; font-weight:700; min-width:0; }
  .team .flag { width:42px; height:31px; border-radius:4px; object-fit:cover; margin:0 auto 5px; box-shadow:0 0 0 1px rgba(255,255,255,0.08); }
  .team .flag.tbd { display:grid; place-items:center; background:var(--card2); color:var(--muted); font-size:1.1rem; }
  .team .nm { display:block; line-height:1.25; }
  .vs { color:var(--gold); font-weight:900; font-size:0.95rem; }
  .mid-score { font-size:1.5rem; font-weight:900; color:var(--text); letter-spacing:1px; }
  .mid-score b { color:var(--gold-light); }

  .result-options { display:flex; gap:6px; margin-bottom:10px; }
  .result-btn { flex:1; background:var(--dark); border:2px solid var(--border); border-radius:10px; padding:9px 4px; color:var(--muted); font-family:inherit; font-size:0.78rem; font-weight:700; cursor:pointer; transition:all 0.15s; }
  .result-btn.sel-win { background:#0d3320; border-color:var(--win); color:var(--win); }
  .result-btn.sel-draw { background:#2e2200; border-color:var(--draw); color:var(--draw); }
  .result-btn.sel-lose { background:#2e0d0d; border-color:var(--lose); color:var(--lose); }
  /* empty-field validation cues - inline, themed, RTL */
  .result-btn.suggested { animation:suggestPulse 1.3s ease-in-out infinite; }
  .score-num.invalid { border-color:var(--red) !important; box-shadow:0 0 0 2px rgba(224,85,85,0.30); animation:fieldShake 0.4s; }
  .card-error { display:none; align-items:center; gap:7px; margin-top:10px; padding:9px 11px; border-radius:9px;
    background:rgba(224,85,85,0.12); border:1px solid rgba(224,85,85,0.40); color:#f4a6a6; font-size:0.8rem; font-weight:700; line-height:1.55; }
  .card-error.show { display:flex; animation:errIn 0.25s ease-out; }
  @keyframes fieldShake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-5px)} 40%{transform:translateX(5px)} 60%{transform:translateX(-3px)} 80%{transform:translateX(3px)} }
  @keyframes suggestPulse { 0%,100%{box-shadow:0 0 0 0 rgba(201,162,39,0)} 50%{box-shadow:0 0 0 3px rgba(201,162,39,0.45)} }
  @keyframes errIn { from{opacity:0; transform:translateY(-3px)} to{opacity:1; transform:translateY(0)} }
  @media (prefers-reduced-motion: reduce) {
    .score-num.invalid{animation:none}
    .card-error.show{animation:none}
    .result-btn.suggested{animation:none; box-shadow:0 0 0 2px rgba(201,162,39,0.55)}
  }

  .score-row { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:12px; }
  .score-num { width:52px; background:var(--dark); border:1px solid var(--border); border-radius:8px; padding:9px 4px; color:var(--text); font-family:inherit; font-size:1.2rem; font-weight:800; text-align:center; outline:none; }
  .score-num:focus { border-color:var(--gold); }
  .score-num:disabled { opacity:0.7; }
  .score-sep { color:var(--gold); font-size:1.4rem; font-weight:900; }
  .score-label { font-size:0.72rem; color:var(--muted); max-width:62px; text-align:center; }

  .save-btn { background:var(--green); color:#fff; border:none; border-radius:10px; padding:11px; font-family:inherit; font-size:0.9rem; font-weight:800; cursor:pointer; width:100%; }
  .save-btn:hover { background:var(--green-light); }

  .verdict { display:flex; align-items:center; justify-content:space-between; gap:10px; background:var(--card2); border-radius:10px; padding:10px 12px; font-size:0.82rem; font-weight:700; }
  .verdict .mine { color:var(--muted); }
  .verdict .pts { font-size:0.95rem; font-weight:900; padding:3px 10px; border-radius:20px; }
  .verdict .pts.p3 { background:#0d3320; color:var(--win); }
  .verdict .pts.p1 { background:#2e2200; color:var(--draw); }
  .verdict .pts.p0 { background:#2e0d0d; color:var(--lose); }

  .lb-card { background:var(--card); border-radius:14px; padding:14px 16px; margin-bottom:10px; border:1px solid var(--line); display:flex; align-items:center; gap:14px; }
  .lb-card.me { border-color:var(--green-light); }
  .lb-rank { font-size:1.3rem; font-weight:900; color:var(--muted); min-width:34px; text-align:center; }
  .lb-rank.r1{color:var(--gold-light);} .lb-rank.r2{color:#c0c0c0;} .lb-rank.r3{color:#cd7f32;}
  .lb-name { flex:1; font-size:1rem; font-weight:800; }
  .lb-name small { color:var(--muted); font-weight:600; font-size:0.72rem; }
  .lb-pts { font-size:1.3rem; font-weight:900; color:var(--gold-light); }
  .lb-pts span { font-size:0.72rem; color:var(--muted); font-weight:400; }

  /* reveal: per-match prediction breakdown (tap a finished match to expand) */
  .reveal-match { background:var(--card); border-radius:14px; margin-bottom:12px; border:1px solid var(--line); overflow:hidden; }
  .reveal-match.open { border-color:var(--border); }
  .reveal-head { display:flex; align-items:center; gap:10px; padding:12px 14px; cursor:pointer; }
  .reveal-head .chev { color:var(--muted); transition:transform .2s; font-size:0.85rem; }
  .reveal-match.open .chev { transform:rotate(180deg); }
  .rv-count { font-size:0.72rem; color:var(--muted); white-space:nowrap; }
  .rv-teams { flex:1; display:flex; align-items:center; justify-content:center; gap:8px; font-size:0.82rem; font-weight:700; min-width:0; }
  .rv-team { display:flex; align-items:center; gap:6px; min-width:0; }
  .rv-team img { width:26px; height:19px; border-radius:3px; object-fit:cover; box-shadow:0 0 0 1px rgba(255,255,255,0.08); }
  .rv-team span { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .rv-score { font-size:1.05rem; font-weight:900; color:var(--gold-light); letter-spacing:1px; white-space:nowrap; }
  .reveal-body { padding:0 14px 10px; animation:errIn .2s ease-out; }
  .reveal-row { display:flex; align-items:center; gap:10px; padding:9px 2px; border-top:1px solid var(--line); }
  .reveal-row .nm { flex:1; font-size:0.9rem; font-weight:800; line-height:1.5; min-width:0; }
  .reveal-row .nm small { display:block; color:var(--muted); font-weight:600; font-size:0.74rem; }
  .reveal-row.me { background:rgba(37,160,90,0.10); border-radius:8px; }
  .reveal-row .pts { font-size:0.9rem; font-weight:900; padding:3px 10px; border-radius:20px; min-width:36px; text-align:center; }
  .reveal-row .pts.p3 { background:#0d3320; color:var(--win); }
  .reveal-row .pts.p1 { background:#2e2200; color:var(--draw); }
  .reveal-row .pts.p0 { background:#2e0d0d; color:var(--lose); }

  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--green); color:#fff; padding:12px 24px; border-radius:24px; font-weight:800; font-size:0.92rem; z-index:999; opacity:0; transition:opacity .3s; pointer-events:none; white-space:nowrap; }
  .toast.show { opacity:1; }
  .loading,.empty { text-align:center; padding:36px 20px; color:var(--muted); }
  .empty .icon { font-size:2.6rem; margin-bottom:10px; }
  .hint { color:var(--muted); font-size:0.78rem; text-align:center; margin-top:8px; line-height:1.6; }

  #loginScreen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:88vh; padding:24px; }
  #loginScreen .logo { font-size:4rem; margin-bottom:14px; }
  #loginScreen h2 { font-size:1.3rem; font-weight:900; color:var(--gold-light); margin-bottom:8px; text-align:center; }
  #loginScreen p { color:var(--muted); font-size:0.85rem; margin-bottom:22px; text-align:center; }
  #loginScreen input { width:100%; max-width:300px; background:var(--dark); border:1px solid var(--border); border-radius:10px; padding:13px 14px; color:var(--text); font-family:inherit; font-size:1rem; outline:none; margin-bottom:12px; text-align:center; }
  #loginScreen input:focus { border-color:var(--green-light); }
  #loginScreen .btn { width:100%; max-width:300px; background:var(--gold); color:var(--dark); border:none; border-radius:10px; padding:13px; font-family:inherit; font-size:1rem; font-weight:900; cursor:pointer; }
  .backlink { display:block; text-align:center; color:var(--muted); font-size:0.78rem; margin-top:18px; text-decoration:none; }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="logo">🏆</div>
  <h2>توقعات كأس العالم 2026</h2>
  <p>اكتب اسمك للمشاركة مع الشباب — بدون كلمة سر</p>
  <input type="text" id="nameInput" placeholder="اسمك..." maxlength="24" autocomplete="off">
  <button class="btn" id="loginBtn">ادخل 🚀</button>
  <a class="backlink" href="./">↩ العودة إلى جدول المباريات</a>
</div>

<div id="mainApp" style="display:none;">
  <div class="topbar">
    <div class="header">
      <button class="out" id="logoutBtn">خروج</button>
      <a class="sched" href="./">📅 الجدول</a>
      <h1>🏆 توقعات 2026</h1>
      <p id="welcomeMsg"></p>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="predictions">⚽ توقعاتي</button>
      <button class="tab" data-tab="leaderboard">🏅 الترتيب</button>
      <button class="tab" data-tab="results">📋 النتائج</button>
      <button class="tab" data-tab="reveal">👀 توقعاتهم</button>
    </div>
  </div>
  <div id="tab-predictions" class="section active"></div>
  <div id="tab-leaderboard" class="section"></div>
  <div id="tab-results" class="section"></div>
  <div id="tab-reveal" class="section"></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { resolve, displayStatus, hasScore, buildLiveOverlay } from './assets/engine.js';
import { scoreOutcome, nearestMatchIndex } from './assets/predict-logic.js';

const SUPABASE_URL = 'https://ioradtnlrxbffkfgkyls.supabase.co';
const SUPABASE_KEY = 'sb_publishable_AGBc0x8K5z9ZMr-I5MzoBA_ERrYu_IV';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Arabic team names by ISO code
const AR = {
  mx:'المكسيك', za:'جنوب أفريقيا', kr:'كوريا الجنوبية', cz:'التشيك',
  ca:'كندا', ba:'البوسنة والهرسك', qa:'قطر', ch:'سويسرا',
  br:'البرازيل', ma:'المغرب', ht:'هايتي', 'gb-sct':'اسكتلندا',
  us:'الولايات المتحدة', py:'باراغواي', au:'أستراليا', tr:'تركيا',
  de:'ألمانيا', cw:'كوراساو', ci:'ساحل العاج', ec:'الإكوادور',
  nl:'هولندا', jp:'اليابان', se:'السويد', tn:'تونس',
  be:'بلجيكا', eg:'مصر', ir:'إيران', nz:'نيوزيلندا',
  es:'إسبانيا', cv:'الرأس الأخضر', sa:'السعودية', uy:'أوروغواي',
  fr:'فرنسا', sn:'السنغال', iq:'العراق', no:'النرويج',
  ar:'الأرجنتين', dz:'الجزائر', at:'النمسا', jo:'الأردن',
  pt:'البرتغال', cd:'الكونغو الديمقراطية', uz:'أوزبكستان', co:'كولومبيا',
  'gb-eng':'إنجلترا', hr:'كرواتيا', gh:'غانا', pa:'بنما',
};
const STAGE_AR = { group:'المجموعات', r32:'دور الـ32', r16:'دور الـ16', qf:'ربع النهائي', sf:'نصف النهائي', third:'مباراة المركز الثالث', final:'النهائي' };
const STAGE_ORDER = { group:0, r32:1, r16:2, qf:3, sf:4, third:5, final:6 };

const fmtDate = new Intl.DateTimeFormat('ar', { timeZone:'Asia/Riyadh', weekday:'long', day:'numeric', month:'long' });
const fmtTime = new Intl.DateTimeFormat('ar', { timeZone:'Asia/Riyadh', hour:'numeric', minute:'2-digit', hour12:true });
const flagURL = (c) => `https://flagcdn.com/${c}.svg`;
const $ = (s, r = document) => r.querySelector(s);

let DATA = null, RES = null, MATCHES = [], PLAYER = null, MYPRED = {}, LIVE_OV = new Map();

// ── scoring — the single source of truth ────────────────────────────────────
// 3 = exact scoreline, 1 = correct outcome only, 0 = wrong. Only scoreable
// (finished) matches count.
function points(pred, real) {
  if (!pred || !real) return null;
  const ro = real.hs > real.as ? 'h' : real.hs < real.as ? 'a' : 'd';
  const exact = Number.isFinite(pred.home_score) && Number.isFinite(pred.away_score)
    && pred.home_score === real.hs && pred.away_score === real.as;
  if (exact) return 3;
  if (pred.result === ro) return 1;
  return 0;
}

// ── data ────────────────────────────────────────────────────────────────────
async function loadTournament() {
  const res = await fetch('data/tournament.json', { cache: 'no-store' });
  DATA = await res.json();
  RES = resolve(DATA, Date.now());
  buildMatches();
}
// Build the render model from committed data, then apply the live FIFA overlay
// (render-time only) so a just-finished match shows its final score/status
// within ~45s — independent of the slower, sometimes-skipped GitHub cron commit.
function buildMatches() {
  if (!DATA || !RES) return;
  const sideOf = (s) => (s.placeholder ? { placeholder: s.placeholder, code: null } : { code: s.code, name: AR[s.code] || s.name });
  MATCHES = DATA.matches.slice()
    .sort((a, b) => Date.parse(a.kickoff_utc) - Date.parse(b.kickoff_utc))
    .map((m) => {
      const r = RES.resolved.get(m.id);
      let st = displayStatus(m, Date.now());
      let real = (st !== 'live' && hasScore(m)) ? { hs: m.home_score, as: m.away_score } : null;
      const ov = LIVE_OV.get(m.id); // FIFA overlay: { home, away, min, status }
      if (ov) {
        st = ov.status; // 'live' | 'finished'
        real = ov.status === 'finished' ? { hs: ov.home, as: ov.away } : null;
      }
      return {
        id: m.id, stage: m.stage, group: m.group, kickoff: m.kickoff_utc,
        home: sideOf(r.home), away: sideOf(r.away),
        ready: !r.home.placeholder && !r.away.placeholder,
        status: st,
        locked: Date.now() >= Date.parse(m.kickoff_utc),
        real,
      };
    });
}

async function loadMyPred() {
  const { data } = await sb.from('predictions').select('*').eq('player_id', PLAYER.id);
  MYPRED = {};
  (data || []).forEach((p) => { MYPRED[p.match_id] = p; });
}

// ── auth (name only) ────────────────────────────────────────────────────────
// Name-only "session": one row per name in `players` + the name in localStorage
// so the login persists across the tournament. Robust against a slow or failed
// network — the button shows progress and a failure never dead-ends the screen.
let loggingIn = false;
async function login(name) {
  name = (name || '').trim();
  if (!name || loggingIn) return; // ignore empty / double submits
  loggingIn = true;
  const btn = $('#loginBtn');
  const origText = btn ? btn.textContent : '';
  if (btn) { btn.disabled = true; btn.textContent = '⏳ جاري الدخول...'; }
  try {
    const { data, error } = await sb.from('players').upsert({ name }, { onConflict: 'name' }).select().single();
    if (error || !data) { toast('تعذّر الاتصال بقاعدة البيانات، حاول مرة أخرى', 'err'); return; }
    PLAYER = data;
    localStorage.setItem('wcp_name', name);
    if (!DATA) { try { await loadTournament(); } catch (e) {} } // ensure the schedule is ready
    await loadMyPred();
    $('#loginScreen').style.display = 'none';
    $('#mainApp').style.display = 'block';
    $('#welcomeMsg').textContent = `أهلاً ${name} 👋`;
    renderPredictions(true); // open on the nearest match
  } catch (e) {
    toast('تعذّر الاتصال، تحقّق من الإنترنت وحاول مجدداً', 'err');
  } finally {
    loggingIn = false;
    if (btn) { btn.disabled = false; btn.textContent = origText; }
  }
}
function logout() { localStorage.removeItem('wcp_name'); location.reload(); }

// ── render: predictions ─────────────────────────────────────────────────────
function sectionKey(m) { return m.stage === 'group' ? `المجموعة ${m.group}` : STAGE_AR[m.stage]; }

function renderPredictions(focus = false) {
  const host = $('#tab-predictions');
  let html = `<div class="card"><div class="pts-legend">
      <div class="pts-item"><span class="pts-val">3</span>نتيجة مطابقة</div>
      <div class="pts-item"><span class="pts-val">1</span>الفائز صحيح</div>
      <div class="pts-item"><span class="pts-val">0</span>خطأ</div>
    </div><p class="hint">التوقع يُقفل عند بداية المباراة. النتائج تتحدّث تلقائياً.</p></div>`;

  let lastKey = null;
  for (const m of MATCHES) {
    const key = sectionKey(m);
    if (key !== lastKey) { html += `<div class="group-label">⚽ ${key}</div>`; lastKey = key; }
    html += matchCard(m);
  }
  host.innerHTML = html;
  if (focus) scrollToNearest();
}

// Open the predictions view on the match that matters now (live, else next
// upcoming, else the last). Offset by the sticky top-bar so the card isn't
// hidden underneath it.
function scrollToNearest() {
  const i = nearestMatchIndex(MATCHES, Date.now());
  if (i < 0) return;
  const el = document.getElementById('m_' + MATCHES[i].id);
  if (!el) return;
  requestAnimationFrame(() => {
    const bar = document.querySelector('.topbar');
    const offset = (bar ? bar.offsetHeight : 0) + 10;
    const y = el.getBoundingClientRect().top + window.scrollY - offset;
    window.scrollTo({ top: Math.max(0, y), behavior: 'smooth' });
    el.classList.add('focus-flash');
    setTimeout(() => el.classList.remove('focus-flash'), 1600);
  });
}

function teamCell(side) {
  const flag = side.code
    ? `<img class="flag" src="${flagURL(side.code)}" alt="" width="42" height="31">`
    : `<span class="flag tbd">؟</span>`;
  const name = side.code ? side.name : 'يُحدَّد لاحقاً';
  return `<div class="team">${flag}<span class="nm">${name}</span></div>`;
}

function statusChip(m) {
  if (m.status === 'live') return '<span class="st-chip live">● مباشر</span>';
  if (m.real) return '<span class="st-chip ft">انتهت</span>';
  if (m.locked) return '<span class="st-chip lock">🔒 مقفل</span>';
  return '<span class="st-chip soon">يُتوقَّع</span>';
}

function matchCard(m) {
  const pr = MYPRED[m.id];
  const when = `${fmtDate.format(new Date(m.kickoff))} · ${fmtTime.format(new Date(m.kickoff))}`;
  let mid = `<div class="vs">VS</div>`;
  if (m.real) mid = `<div class="mid-score"><b>${m.real.hs}</b> - <b>${m.real.as}</b></div>`;

  let body = '';
  if (!m.ready) {
    body = `<p class="hint">يفتح التوقّع عند تحديد الفريقين</p>`;
  } else if (m.locked) {
    // read-only + verdict
    if (pr) {
      const pv = m.real ? points(pr, m.real) : null;
      const myLine = `توقّعك: ${pickLabel(m, pr)}${Number.isFinite(pr.home_score) && Number.isFinite(pr.away_score) ? ` (${pr.home_score}-${pr.away_score})` : ''}`;
      const badge = pv === null ? '<span class="pts" style="background:var(--card);color:var(--muted)">بانتظار النتيجة</span>'
        : `<span class="pts p${pv}">${pv === 0 ? '٠' : '+' + pv}</span>`;
      body = `<div class="verdict"><span class="mine">${myLine}</span>${badge}</div>`;
    } else {
      body = `<p class="hint">لم تتوقّع هذه المباراة</p>`;
    }
  } else {
    const sel = pr ? pr.result : null;
    const hs = pr && Number.isFinite(pr.home_score) ? pr.home_score : '';
    const as = pr && Number.isFinite(pr.away_score) ? pr.away_score : '';
    body = `
      <div class="result-options">
        <button class="result-btn ${sel === 'h' ? 'sel-win' : ''}" data-act="pick" data-m="${m.id}" data-r="h">فوز ${m.home.name}</button>
        <button class="result-btn ${sel === 'd' ? 'sel-draw' : ''}" data-act="pick" data-m="${m.id}" data-r="d">تعادل</button>
        <button class="result-btn ${sel === 'a' ? 'sel-lose' : ''}" data-act="pick" data-m="${m.id}" data-r="a">فوز ${m.away.name}</button>
      </div>
      <div class="score-row">
        <span class="score-label">${m.home.name}</span>
        <input class="score-num" type="number" inputmode="numeric" min="0" max="20" value="${hs}" placeholder="-" id="hs_${m.id}">
        <span class="score-sep">:</span>
        <input class="score-num" type="number" inputmode="numeric" min="0" max="20" value="${as}" placeholder="-" id="as_${m.id}">
        <span class="score-label">${m.away.name}</span>
      </div>
      <button class="save-btn" data-act="save" data-m="${m.id}">💾 حفظ التوقع</button>
      <div class="card-error" id="err_${m.id}"></div>`;
  }

  return `<div class="match-card ${m.locked ? 'locked' : ''}" id="m_${m.id}">
      <div class="match-head"><span class="match-when">${when}</span>${statusChip(m)}</div>
      <div class="teams-row">${teamCell(m.home)}${mid}${teamCell(m.away)}</div>
      ${body}
    </div>`;
}
function pickLabel(m, pr) {
  if (pr.result === 'h') return `فوز ${m.home.name}`;
  if (pr.result === 'a') return `فوز ${m.away.name}`;
  return 'تعادل';
}

// read the two score boxes of a card as numbers (NaN when empty)
function cardScore(card) {
  return {
    hs: parseInt(card.querySelector('input[id^="hs_"]')?.value, 10),
    as: parseInt(card.querySelector('input[id^="as_"]')?.value, 10),
  };
}
// highlight the winner button matching result code r ('h' | 'd' | 'a'); null clears all
function highlightResult(card, r) {
  card.querySelectorAll('.result-btn').forEach((b) => { b.className = 'result-btn'; });
  const btn = r ? card.querySelector(`.result-btn[data-r="${r}"]`) : null;
  if (btn) btn.className = `result-btn ${r === 'h' ? 'sel-win' : r === 'd' ? 'sel-draw' : 'sel-lose'}`;
}
// gently pulse the winner button matching the typed score, as a "اضغط هنا" hint
function hintWinner(card, r) {
  card.querySelectorAll('.result-btn').forEach((b) => b.classList.remove('suggested'));
  if (r) { const btn = card.querySelector(`.result-btn[data-r="${r}"]`); if (btn) btn.classList.add('suggested'); }
}

// inline, field-level Arabic error: mark the empty field(s) and show the note
function showCardError(card, miss) {
  const home = card.querySelector('input[id^="hs_"]');
  const away = card.querySelector('input[id^="as_"]');
  if (home) home.classList.toggle('invalid', !!miss.home);
  if (away) away.classList.toggle('invalid', !!miss.away);
  if (miss.winner) { const { hs, as } = cardScore(card); hintWinner(card, scoreOutcome(hs, as)); }
  const noScore = miss.home || miss.away;
  const msg = noScore && miss.winner ? 'هناك حقل فارغ، أكمل النتيجة ثم اختر الفائز'
    : noScore ? 'هناك حقل فارغ، أدخل نتيجة الفريقين'
    : 'لم تختر الفائز، اضغط على فوز فريق أو تعادل';
  const box = card.querySelector('.card-error');
  if (box) { box.textContent = '⚠️ ' + msg; box.classList.remove('show'); void box.offsetWidth; box.classList.add('show'); }
}
function clearCardError(card) {
  card.querySelectorAll('.invalid').forEach((el) => el.classList.remove('invalid'));
  const box = card.querySelector('.card-error'); if (box) box.classList.remove('show');
}

// pick a winner (in-memory until save). The written score stays authoritative:
// tapping a winner that disagrees with a complete score is refused in Arabic and
// the score-consistent winner is selected instead.
function pick(matchId, r, btn) {
  const card = btn.closest('.match-card');
  const { hs, as } = cardScore(card);
  const fromScore = scoreOutcome(hs, as);
  if (fromScore && fromScore !== r) { toast('الفائز لا يطابق النتيجة المكتوبة', 'err'); r = fromScore; }
  highlightResult(card, r);
  hintWinner(card, null);
  MYPRED[matchId] = { ...(MYPRED[matchId] || {}), result: r };
  if (Number.isFinite(hs) && Number.isFinite(as)) clearCardError(card);
}

// as the user types a score: hint the matching winner (an explicit tap is still
// required), and drop a now-contradicting pick so the card never lies
function syncFromScore(matchId, card) {
  const { hs, as } = cardScore(card);
  const fromScore = scoreOutcome(hs, as);
  hintWinner(card, fromScore);
  const cur = (MYPRED[matchId] || {}).result;
  if (fromScore && cur && cur !== fromScore) { highlightResult(card, null); MYPRED[matchId] = { ...(MYPRED[matchId] || {}), result: null }; }
  clearCardError(card);
}

async function savePred(matchId) {
  const m = MATCHES.find((x) => x.id === matchId);
  if (!m || m.locked) { toast('انتهى وقت التوقّع لهذه المباراة', 'err'); refreshAndRerender(); return; }
  const card = document.getElementById('m_' + matchId);
  const hsv = parseInt($('#hs_' + matchId).value, 10);
  const asv = parseInt($('#as_' + matchId).value, 10);
  const winner = (MYPRED[matchId] || {}).result;
  // require BOTH scores AND a chosen winner; otherwise flag the empty field(s)
  const miss = { home: !Number.isFinite(hsv), away: !Number.isFinite(asv), winner: !(winner === 'h' || winner === 'a' || winner === 'd') };
  if (miss.home || miss.away || miss.winner) { showCardError(card, miss); return; }
  clearCardError(card);
  const result = scoreOutcome(hsv, asv); // both present -> defined; the score is the source of truth
  const row = { player_id: PLAYER.id, match_id: matchId, result, home_score: hsv, away_score: asv };
  try {
    const { error } = await sb.from('predictions').upsert(row, { onConflict: 'player_id,match_id' });
    if (error) { toast('خطأ في الحفظ', 'err'); return; }
  } catch (e) { toast('تعذّر حفظ التوقع، حاول مجدداً', 'err'); return; }
  MYPRED[matchId] = row;
  toast('✅ تم حفظ التوقع');
}

// ── render: leaderboard (auto-scored from live results) ──────────────────────
async function renderLeaderboard() {
  const host = $('#tab-leaderboard');
  host.innerHTML = '<div class="loading">⏳ جاري الحساب...</div>';
  await loadTournament(); // refresh real results
  const [{ data: players }, { data: preds }] = await Promise.all([
    sb.from('players').select('*'),
    sb.from('predictions').select('*'),
  ]);
  const realById = new Map(MATCHES.filter((m) => m.real).map((m) => [m.id, m.real]));
  const tally = {};
  (players || []).forEach((p) => { tally[p.id] = { name: p.name, pts: 0, exact: 0, hit: 0 }; });
  (preds || []).forEach((pr) => {
    const real = realById.get(pr.match_id);
    const t = tally[pr.player_id];
    if (!real || !t) return;
    const pv = points(pr, real);
    t.pts += pv;
    if (pv === 3) t.exact++;
    if (pv > 0) t.hit++;
  });

  const played = realById.size;
  const sorted = Object.values(tally).sort((a, b) => b.pts - a.pts || b.exact - a.exact || a.name.localeCompare(b.name, 'ar'));

  let html = `<div class="card" style="text-align:center;">
      <div style="font-size:0.82rem;color:var(--muted);">المباريات المنتهية</div>
      <div style="font-size:2rem;font-weight:900;color:var(--gold-light);">${played} / ${MATCHES.length}</div>
    </div>`;
  if (!sorted.length) html += '<div class="empty"><div class="icon">👥</div><p>لا يوجد لاعبون بعد</p></div>';
  sorted.forEach((p, i) => {
    const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1);
    const rc = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : '';
    const me = p.name === PLAYER.name ? ' me' : '';
    html += `<div class="lb-card${me}">
        <div class="lb-rank ${rc}">${medal}</div>
        <div class="lb-name">${p.name}${me ? ' 👈' : ''}<br><small>${p.exact} نتيجة مطابقة · ${p.hit} توقّع صحيح</small></div>
        <div class="lb-pts">${p.pts} <span>نقطة</span></div>
      </div>`;
  });
  host.innerHTML = html;
}

// ── render: results (read-only, real) ───────────────────────────────────────
async function renderResults() {
  const host = $('#tab-results');
  host.innerHTML = '<div class="loading">⏳ جاري التحميل...</div>';
  await loadTournament();
  paintResults();
}
function paintResults() {
  const host = $('#tab-results');
  let html = '<p class="hint" style="margin-bottom:14px;">النتائج تُجلب تلقائياً من المصدر الرسمي.</p>';
  let lastKey = null;
  for (const m of MATCHES) {
    const key = sectionKey(m);
    if (key !== lastKey) { html += `<div class="group-label">⚽ ${key}</div>`; lastKey = key; }
    const when = `${fmtDate.format(new Date(m.kickoff))} · ${fmtTime.format(new Date(m.kickoff))}`;
    const mid = m.real ? `<div class="mid-score"><b>${m.real.hs}</b> - <b>${m.real.as}</b></div>`
      : m.status === 'live' ? '<div class="vs" style="color:var(--red)">● مباشر</div>' : '<div class="vs">VS</div>';
    html += `<div class="match-card"><div class="match-head"><span class="match-when">${when}</span>${statusChip(m)}</div>
        <div class="teams-row">${teamCell(m.home)}${mid}${teamCell(m.away)}</div></div>`;
  }
  host.innerHTML = html;
}

// ── reveal: after each match, who predicted what — and why the points ────────
// Only finished matches appear (predictions stay hidden until a match ends).
// Newest match first, latest auto-expanded; tap a match to expand/collapse.
let REVEAL_DATA = null, revealOpen = new Set(), revealAutoOpened = false;
async function renderReveal() {
  const host = $('#tab-reveal');
  host.innerHTML = '<div class="loading">⏳ جاري التحميل...</div>';
  try {
    await loadTournament(); // fresh results (+ live overlay)
    const [pRes, prRes] = await Promise.all([
      sb.from('players').select('*').limit(5000),
      sb.from('predictions').select('*').limit(5000), // fetch all so older matches are never truncated by a default row cap
    ]);
    REVEAL_DATA = { players: pRes.data || [], preds: prRes.data || [] };
  } catch (e) {
    host.innerHTML = '<div class="empty"><div class="icon">⚠️</div><p>تعذّر تحميل التوقعات، حاول مجدداً</p></div>';
    return;
  }
  paintReveal();
}
function miniTeam(side) {
  const flag = side.code ? `<img src="${flagURL(side.code)}" alt="" width="26" height="19">` : '';
  return `<span class="rv-team">${flag}<span>${side.code ? side.name : '?'}</span></span>`;
}
function revealRow(m, x) {
  const pr = x.pr;
  const me = PLAYER && x.name === PLAYER.name ? ' me' : '';
  const score = Number.isFinite(pr.home_score) && Number.isFinite(pr.away_score) ? ` ${pr.home_score}-${pr.away_score}` : '';
  const reason = x.pts === 3 ? 'نتيجة مطابقة' : x.pts === 1 ? 'الفائز صحيح' : 'لم يوفّق';
  return `<div class="reveal-row${me}">
      <span class="pts p${x.pts}">${x.pts === 0 ? '٠' : '+' + x.pts}</span>
      <span class="nm">${x.name}${me ? ' 👈' : ''}<br><small>${pickLabel(m, pr)}${score} · ${reason}</small></span>
    </div>`;
}
function revealCard(m, list) {
  const head = `<div class="reveal-head" data-act="reveal" data-m="${m.id}">
      <span class="chev">▾</span>
      <span class="rv-teams">${miniTeam(m.home)}<span class="rv-score"><b>${m.real.hs}</b>-<b>${m.real.as}</b></span>${miniTeam(m.away)}</span>
      <span class="rv-count">${list.length} 👤</span>
    </div>`;
  if (!revealOpen.has(m.id)) return `<div class="reveal-match">${head}</div>`;
  const body = list.length ? list.map((x) => revealRow(m, x)).join('') : '<p class="hint">لا أحد توقّع هذه المباراة</p>';
  return `<div class="reveal-match open">${head}<div class="reveal-body">${body}</div></div>`;
}
function paintReveal() {
  const host = $('#tab-reveal');
  if (!REVEAL_DATA) return;
  const nameById = new Map(REVEAL_DATA.players.map((p) => [p.id, p.name]));
  const byMatch = new Map();
  REVEAL_DATA.preds.forEach((p) => { if (!byMatch.has(p.match_id)) byMatch.set(p.match_id, []); byMatch.get(p.match_id).push(p); });
  const finished = MATCHES.filter((m) => m.real && m.ready).sort((a, b) => Date.parse(b.kickoff) - Date.parse(a.kickoff));
  if (!finished.length) {
    host.innerHTML = '<div class="empty"><div class="icon">⏳</div><p>لا توجد مباريات منتهية بعد.<br>ستظهر توقعات الشباب هنا بعد كل مباراة.</p></div>';
    return;
  }
  if (!revealAutoOpened) { revealOpen.add(finished[0].id); revealAutoOpened = true; } // open the latest match by default
  let html = '<p class="hint" style="margin-bottom:14px;">بعد كل مباراة: اضغط عليها لترى توقّع كل لاعب والنقاط التي حصل عليها.</p>';
  for (const m of finished) {
    const list = (byMatch.get(m.id) || [])
      .map((pr) => ({ pr, name: nameById.get(pr.player_id) || '—', pts: points(pr, m.real) }))
      .filter((x) => x.pts !== null)
      .sort((a, b) => b.pts - a.pts || a.name.localeCompare(b.name, 'ar'));
    html += revealCard(m, list);
  }
  host.innerHTML = html;
}
function toggleReveal(id) { if (revealOpen.has(id)) revealOpen.delete(id); else revealOpen.add(id); paintReveal(); }

async function refreshAndRerender(focus = false) { await loadTournament(); await loadMyPred(); renderPredictions(focus); }

// ── events ──────────────────────────────────────────────────────────────────
function toast(msg, kind) {
  const t = $('#toast');
  t.textContent = msg;
  t.style.background = kind === 'err' ? 'var(--red)' : 'var(--green)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t) => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.section').forEach((s) => s.classList.remove('active'));
  $('#tab-' + name).classList.add('active');
  if (name === 'predictions') refreshAndRerender(true);
  if (name === 'leaderboard') renderLeaderboard();
  if (name === 'results') renderResults();
  if (name === 'reveal') renderReveal();
}

document.addEventListener('click', (e) => {
  const t = e.target.closest('[data-act], [data-tab], #loginBtn, #logoutBtn');
  if (!t) return;
  if (t.id === 'loginBtn') return login($('#nameInput').value);
  if (t.id === 'logoutBtn') return logout();
  if (t.dataset.tab) return switchTab(t.dataset.tab);
  if (t.dataset.act === 'pick') return pick(+t.dataset.m, t.dataset.r, t);
  if (t.dataset.act === 'save') return savePred(+t.dataset.m);
  if (t.dataset.act === 'reveal') return toggleReveal(+t.dataset.m);
});
$('#nameInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') login($('#nameInput').value); });

// live-sync the winner buttons to whatever score the user types
document.addEventListener('input', (e) => {
  const inp = e.target.closest('.score-num');
  if (!inp) return;
  const card = inp.closest('.match-card');
  const id = parseInt(inp.id.split('_')[1], 10);
  if (card && Number.isFinite(id)) syncFromScore(id, card);
});

// ── live results overlay (key-free FIFA poll, render-time only) ──────────────
// The committed schedule only updates when the GitHub cron runs, which can be
// delayed or skipped entirely — so a final can show late. We also poll FIFA
// directly here and overlay just-finished results onto MATCHES, so finals appear
// within ~45s regardless of the cron. It NEVER writes to the DB or committed
// data; if FIFA is unreachable it backs off and falls back to committed data.
const FIFA_LIVE_URL = 'https://api.fifa.com/api/v3/calendar/matches?idCompetition=17&idSeason=285023&count=500&language=en';
const FIFA_BASE_MS = 45000;
let fifaTimer = null, fifaBackoff = 0;
function shouldPoll() {
  if (LIVE_OV.size) return true;
  const now = Date.now();
  return MATCHES.some((m) => {
    if (m.status === 'live') return true; // committed says live -> may be stuck-live; keep polling so we can flip it to finished
    const ko = Date.parse(m.kickoff);
    return now >= ko - 9e5 && now < ko + 1.8e7; // -15min .. +5h after kickoff (covers late finals when the cron lags)
  });
}
function overlayEqual(a, b) {
  if (a.size !== b.size) return false;
  for (const [k, v] of a) { const w = b.get(k); if (!w || w.home !== v.home || w.away !== v.away || w.status !== v.status) return false; }
  return true;
}
function rerenderActive() {
  if ($('#mainApp').style.display !== 'block') return;
  const active = document.querySelector('.section.active');
  if (!active) return;
  if (active.id === 'tab-predictions') {
    const el = document.activeElement; // don't clobber a score the user is typing
    if (el && el.classList && el.classList.contains('score-num')) return;
    renderPredictions(false);
  } else if (active.id === 'tab-results') {
    paintResults();
  }
}
function scheduleFifa(delay) { clearTimeout(fifaTimer); fifaTimer = setTimeout(fifaTick, delay); }
async function fifaTick() {
  if (document.visibilityState !== 'visible' || $('#mainApp').style.display !== 'block') { scheduleFifa(5000); return; } // not ready (hidden/pre-login) — re-check soon
  if (!shouldPoll() && LIVE_OV.size === 0) { scheduleFifa(FIFA_BASE_MS); return; } // logged in but nothing live/near
  try {
    const res = await fetch(FIFA_LIVE_URL, { headers: { Accept: 'application/json' }, cache: 'no-store' });
    if (!res.ok) throw new Error('http ' + res.status);
    const json = await res.json();
    const rows = json.Results || [];
    if (rows.length < 64) throw new Error('unexpected shape');
    if (!DATA) { scheduleFifa(FIFA_BASE_MS); return; }
    const committed = new Map(DATA.matches.map((m) => [m.id, m]));
    const ids = new Set(DATA.matches.map((m) => m.id));
    const next = buildLiveOverlay(rows, committed, ids);
    fifaBackoff = 0;
    if (!overlayEqual(LIVE_OV, next)) { LIVE_OV = next; buildMatches(); rerenderActive(); }
    scheduleFifa(FIFA_BASE_MS);
  } catch (e) {
    fifaBackoff = Math.min(5, fifaBackoff + 1);
    if (fifaBackoff >= 3 && LIVE_OV.size) { LIVE_OV = new Map(); buildMatches(); rerenderActive(); } // give up; fall back to committed
    scheduleFifa(FIFA_BASE_MS * (1 + fifaBackoff));
  }
}
function setupFifaLive() {
  scheduleFifa(2500);
  document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') scheduleFifa(1200); });
}

// ── boot ────────────────────────────────────────────────────────────────────
(async function boot() {
  try { await loadTournament(); }
  catch (e) { toast('تعذّر تحميل الجدول', 'err'); }
  const saved = localStorage.getItem('wcp_name');
  if (saved) login(saved); // stay logged in across the tournament
  setupFifaLive();
})();
</script>
